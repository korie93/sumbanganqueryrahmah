name: Release Verification

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: development
  PORT: 5000
  HOST: 127.0.0.1
  PUBLIC_APP_URL: http://127.0.0.1:5000
  CORS_ALLOWED_ORIGINS: http://127.0.0.1:5000
  PG_HOST: 127.0.0.1
  PG_PORT: 5432
  PG_USER: postgres
  PG_DATABASE: sqr_db
  SEED_DEFAULT_USERS: 1
  SEED_SUPERUSER_FULL_NAME: CI Superuser
  SMOKE_BASE_URL: http://127.0.0.1:5000
  PERF_COLLECTION_NICKNAME: Collector Alpha
  RELEASE_ARTIFACTS_DIR: artifacts/release-verification

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * *"

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Generate secure CI runtime secrets
        run: node scripts/ci/generate-runtime-secrets.mjs

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name sqr-release-postgres \
            -e POSTGRES_DB="$PG_DATABASE" \
            -e POSTGRES_USER="$PG_USER" \
            -e POSTGRES_PASSWORD="$PG_PASSWORD" \
            -p 5432:5432 \
            postgres:16

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker exec sqr-release-postgres pg_isready -U "$PG_USER" -d "$PG_DATABASE"; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs sqr-release-postgres
          exit 1

      - name: Verify repo hygiene
        run: npm run verify:repo-hygiene

      - name: Verify dependency supply chain
        run: npm run verify:dependency-supply-chain

      - name: Audit dependencies
        run: npm run audit:dependencies

      - name: Verify migration drift
        run: npm run db:check

      - name: Verify DB schema governance
        run: npm run verify:db-schema-governance

      - name: Verify load-testing scaffold
        run: node --test scripts/tests/load-testing-contract.test.mjs

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run release readiness verification
        run: npm run release:verify:local

      - name: Upload release verification artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-verification-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            artifacts/release-verification
            var/perf

      - name: Stop PostgreSQL
        if: always()
        run: |
          docker rm -f sqr-release-postgres >/dev/null 2>&1 || true
