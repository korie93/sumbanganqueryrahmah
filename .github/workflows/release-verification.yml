name: Release Verification

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: development
  PORT: 5000
  HOST: 127.0.0.1
  PUBLIC_APP_URL: http://127.0.0.1:5000
  CORS_ALLOWED_ORIGINS: http://127.0.0.1:5000
  SESSION_SECRET: sqr-ci-session-${{ github.run_id }}-${{ github.run_attempt }}-generate-per-run-secret-48chars
  TWO_FACTOR_ENCRYPTION_KEY: sqr-ci-two-factor-${{ github.run_id }}-${{ github.run_attempt }}-encryption-key-32chars
  PG_HOST: 127.0.0.1
  PG_PORT: 5432
  PG_USER: postgres
  PG_PASSWORD: sqr-ci-postgres-${{ github.run_id }}-${{ github.run_attempt }}-password-32chars
  PG_DATABASE: sqr_db
  SEED_DEFAULT_USERS: 1
  SEED_SUPERUSER_USERNAME: superuser${{ github.run_id }}${{ github.run_attempt }}
  SEED_SUPERUSER_PASSWORD: sqr-ci-superuser-${{ github.run_id }}-${{ github.run_attempt }}-password-32chars
  SEED_SUPERUSER_FULL_NAME: CI Superuser
  SEED_SUPERUSER_TWO_FACTOR_SECRET: JBSWY3DPEHPK3PXP
  SMOKE_TEST_USERNAME: superuser${{ github.run_id }}${{ github.run_attempt }}
  SMOKE_TEST_PASSWORD: sqr-ci-superuser-${{ github.run_id }}-${{ github.run_attempt }}-password-32chars
  SMOKE_TEST_TWO_FACTOR_SECRET: JBSWY3DPEHPK3PXP
  SMOKE_BASE_URL: http://127.0.0.1:5000
  PERF_COLLECTION_NICKNAME: Collector Alpha
  RELEASE_ARTIFACTS_DIR: artifacts/release-verification

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * *"

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sqr_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: sqr-ci-postgres-${{ github.run_id }}-${{ github.run_attempt }}-password-32chars
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sqr_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Verify repo hygiene
        run: npm run verify:repo-hygiene

      - name: Verify dependency supply chain
        run: npm run verify:dependency-supply-chain

      - name: Audit dependencies
        run: npm run audit:dependencies

      - name: Verify migration drift
        run: npm run db:check

      - name: Verify DB schema governance
        run: npm run verify:db-schema-governance

      - name: Verify load-testing scaffold
        run: node --test scripts/tests/load-testing-contract.test.mjs

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run release readiness verification
        run: npm run release:verify:local

      - name: Upload release verification artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-verification-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            artifacts/release-verification
            var/perf
