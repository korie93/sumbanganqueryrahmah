name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Verify repo hygiene
        run: npm run verify:repo-hygiene

      - name: Verify migration drift
        run: npm run db:check

      - name: Typecheck
        run: npm run typecheck

      - name: Run client tests
        run: npm run test:client

      - name: Run http tests
        run: npm run test:http

      - name: Run services tests
        run: npm run test:services

      - name: Run routes tests
        run: npm run test:routes

      - name: Build
        run: npm run build

      - name: Verify client bundle budgets
        run: npm run verify:bundle-budgets

  smoke-ui:
    needs: build-and-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sqr_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sqr_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: development
      PORT: 5000
      HOST: 127.0.0.1
      PUBLIC_APP_URL: http://127.0.0.1:5000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5000
      SESSION_SECRET: ci-session-secret
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: sqr_db
      SEED_DEFAULT_USERS: 1
      SEED_SUPERUSER_USERNAME: superuser${{ github.run_id }}${{ github.run_attempt }}
      SEED_SUPERUSER_PASSWORD: Password123!
      SEED_SUPERUSER_FULL_NAME: CI Superuser
      SMOKE_TEST_USERNAME: superuser${{ github.run_id }}${{ github.run_attempt }}
      SMOKE_TEST_PASSWORD: Password123!
      SMOKE_BASE_URL: http://127.0.0.1:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Verify repo hygiene
        run: npm run verify:repo-hygiene

      - name: Verify migration drift
        run: npm run db:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start built server
        run: |
          npm run start:built > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time"
          cat server.log
          exit 1

      - name: Smoke preflight
        run: npm run smoke:preflight

      - name: Run UI smoke
        run: |
          echo "Running smoke-ui on commit: $GITHUB_SHA"
          git rev-parse HEAD
          grep -n "Login should establish an authenticated session." scripts/ui-smoke.mjs
          SMOKE_ARTIFACTS_DIR=artifacts/smoke-ui npm run smoke:ui

      - name: Print server log on failure
        if: failure()
        run: cat server.log

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-ui-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            server.log
            artifacts/smoke-ui

      - name: Stop built server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          pkill -f "dist-local/server/index-local.js" || true
