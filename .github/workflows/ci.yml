name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Verify repo hygiene
        run: npm run verify:repo-hygiene

      - name: Verify dependency supply chain
        run: npm run verify:dependency-supply-chain

      - name: Audit dependencies
        run: npm run audit:dependencies

      - name: Verify migration drift
        run: npm run db:check

      - name: Verify DB schema governance
        run: npm run verify:db-schema-governance

      - name: Typecheck
        run: npm run typecheck

      - name: Run API contract tests
        run: npm run test:contracts

      - name: Verify API docs
        run: npm run verify:api-docs

      - name: Run client tests
        run: npm run test:client

      - name: Run client accessibility tests
        run: npm run test:client:a11y

      - name: Verify theme contrast
        run: npm run verify:contrast

      - name: Run script tests
        run: npm run test:scripts

      - name: Run http tests
        run: npm run test:http

      - name: Run services tests
        run: npm run test:services

      - name: Run repositories tests
        run: npm run test:repositories

      - name: Run routes tests
        run: npm run test:routes

      - name: Run WebSocket tests
        run: npm run test:ws

      - name: Run intelligence tests
        run: npm run test:intelligence

      - name: Build
        run: npm run build

      - name: Verify client bundle budgets
        run: npm run verify:bundle-budgets

  coverage-gate:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Enforce coverage gate
        run: npm run test:coverage:gate

      - name: Publish coverage summary
        if: always()
        run: npm run report:coverage-summary

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            coverage

  smoke-ui:
    needs:
      - build-and-test
      - coverage-gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_ENV: development
      PORT: 5000
      HOST: 127.0.0.1
      PUBLIC_APP_URL: http://127.0.0.1:5000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5000
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_USER: postgres
      PG_DATABASE: sqr_db
      SEED_DEFAULT_USERS: 1
      SEED_SUPERUSER_FULL_NAME: CI Superuser
      SMOKE_BASE_URL: http://127.0.0.1:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node version
        run: npm run verify:node-version

      - name: Generate secure CI runtime secrets
        run: node scripts/ci/generate-runtime-secrets.mjs

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name sqr-ci-postgres \
            -e POSTGRES_DB="$PG_DATABASE" \
            -e POSTGRES_USER="$PG_USER" \
            -e POSTGRES_PASSWORD="$PG_PASSWORD" \
            -p 5432:5432 \
            postgres:16

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker exec sqr-ci-postgres pg_isready -U "$PG_USER" -d "$PG_DATABASE"; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          docker logs sqr-ci-postgres
          exit 1

      - name: Verify repo hygiene
        run: npm run verify:repo-hygiene

      - name: Audit dependencies
        run: npm run audit:dependencies

      - name: Verify migration drift
        run: npm run db:check

      - name: Verify DB schema governance
        run: npm run verify:db-schema-governance

      - name: Run DB bootstrap integration tests
        run: npm run test:db-integration

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start built server
        run: |
          : > server.log
          npm run start:built >> server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time"
          if [ -f server.log ]; then
            cat server.log
          else
            echo "server.log was not created"
          fi
          exit 1

      - name: Smoke preflight
        run: npm run smoke:preflight

      - name: Run UI smoke
        run: |
          echo "Running smoke-ui on commit: $GITHUB_SHA"
          git rev-parse HEAD
          grep -n "Login should establish an authenticated session." scripts/ui-smoke.mjs
          SMOKE_ARTIFACTS_DIR=artifacts/smoke-ui npm run smoke:ui

      - name: Capture smoke monitoring snapshot
        if: always()
        continue-on-error: true
        run: |
          MONITOR_OUTPUT_FILE=artifacts/smoke-ui/monitor-stale-conflicts.json npm run monitor:stale-conflicts

      - name: Print server log on failure
        if: failure()
        run: |
          if [ -f server.log ]; then
            cat server.log
          else
            echo "server.log was not created"
          fi

      - name: Stop built server
        if: always()
        run: |
          node scripts/stop-background-server.mjs server.pid

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-ui-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            server.log
            artifacts/smoke-ui

      - name: Stop PostgreSQL
        if: always()
        run: |
          docker rm -f sqr-ci-postgres >/dev/null 2>&1 || true
